services:
  mysql:
    image: mysql:8.4
    container_name: surfside-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-surfside_local_dev}
      MYSQL_DATABASE: surfside
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - surfside_mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  surfside_mysql_data:
